name: Delete Suspended JumpCloud Users

on:
  schedule:
    - cron: '0 14 8-14 * 1'  # Second Monday of every month, 14:00 UTC (7:00 AM PT)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — log what would be deleted without making changes'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-window:
    runs-on: ubuntu-latest
    outputs:
      in-window: ${{ steps.check.outputs.in-window }}
    steps:
      - id: check
        run: |
          DAY=$(date +%-d)
          if [ "$DAY" -ge 8 ] && [ "$DAY" -le 14 ]; then
            echo "in-window=true" >> $GITHUB_OUTPUT
          else
            echo "in-window=false" >> $GITHUB_OUTPUT
          fi

  delete-users:
    needs: check-window
    if: needs.check-window.outputs.in-window == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run deletion script
        run: python delete_users.py
        env:
          JUMPCLOUD_CLIENT_ID: ${{ secrets.JUMPCLOUD_CLIENT_ID }}
          JUMPCLOUD_CLIENT_SECRET: ${{ secrets.JUMPCLOUD_CLIENT_SECRET }}
          DND_GROUP_ID: ${{ secrets.DND_GROUP_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DEBUG: ${{ secrets.DEBUG || 'false' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          SUSPENSION_MIN_AGE_DAYS: ${{ secrets.SUSPENSION_MIN_AGE_DAYS || '14' }}

      - name: Clear candidate list
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          printf '[]' > pending_deletion.json
          git add pending_deletion.json
          git diff --staged --quiet || git commit -m "chore: clear pending deletion list after run [skip ci]"
          git pull --rebase && git push
