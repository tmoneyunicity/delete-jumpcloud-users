name: List Suspended JumpCloud Users

on:
  schedule:
    - cron: '0 14 1-7 * 1'  # First Monday of every month, 14:00 UTC (7:00 AM PT)
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  list-users:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          JUMPCLOUD_CLIENT_ID: ${{ secrets.JUMPCLOUD_CLIENT_ID }}
          JUMPCLOUD_CLIENT_SECRET: ${{ secrets.JUMPCLOUD_CLIENT_SECRET }}
          DND_GROUP_ID: ${{ secrets.DND_GROUP_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DEBUG: ${{ secrets.DEBUG || 'false' }}
          SUSPENSION_MIN_AGE_DAYS: ${{ secrets.SUSPENSION_MIN_AGE_DAYS || '14' }}
        run: python list-users-to-delete.py

      - name: Commit candidate list
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pending_deletion.json
          git diff --staged --quiet || git commit -m "chore: update pending deletion list [skip ci]"
          git pull --rebase && git push
